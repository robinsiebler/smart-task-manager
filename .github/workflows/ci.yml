name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      oracle:
        image: gvenzl/oracle-xe:21-slim
        ports:
          - 1521:1521
        env:
          ORACLE_PASSWORD: ${{ secrets.CI_ORACLE_PASSWORD }}
          APP_USER: ${{ secrets.CI_DB_USER }}
          APP_USER_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 10s
          --health-retries 12

    env:
      DB_USER: ${{ secrets.CI_DB_USER }}
      DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      DB_CONNECTION_STRING: localhost:1521/XEPDB1
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      PORT: 3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            e2e/package-lock.json

      - name: Install root dependencies (lint tooling)
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Apply database migrations
        working-directory: backend
        run: node scripts/run-migrations.js

      - name: Run tests
        working-directory: backend
        run: npm run test:coverage

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Audit e2e dependencies
        working-directory: e2e
        run: npm audit --audit-level=high

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: e2e
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7
