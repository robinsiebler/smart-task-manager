name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: CI
    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-xe:21-slim
        ports:
          - 1521:1521
        env:
          ORACLE_PASSWORD: ${{ secrets.CI_ORACLE_PASSWORD }}
          APP_USER: ${{ secrets.CI_DB_USER }}
          APP_USER_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 10s
          --health-retries 12

    env:
      DB_USER: ${{ secrets.CI_DB_USER }}
      DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      DB_CONNECTION_STRING: localhost:1521/XEPDB1
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      PORT: 3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            e2e/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Apply database migrations
        working-directory: backend
        run: node scripts/run-migrations.js

      - name: Run tests
        working-directory: backend
        run: npm test

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: e2e
        run: npm test
