<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Smart Task Manager</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <h1>Create Account</h1>

    <p id="status-message" class="status-message" role="status" hidden></p>

    <form id="register-form" novalidate>
      <label for="register-username">Username</label>
      <input type="text" id="register-username" name="username" autocomplete="username" maxlength="100" />
      <p class="field-error" id="register-username-error"></p>

      <label for="register-email">Email</label>
      <input type="email" id="register-email" name="email" autocomplete="email" />
      <p class="field-error" id="register-email-error"></p>

      <label for="register-password">Password</label>
      <div class="password-field">
        <input type="password" id="register-password" name="password" autocomplete="new-password" />
        <button type="button" class="password-toggle" id="register-password-toggle" aria-label="Show password"></button>
      </div>
      <p class="field-error" id="register-password-error"></p>

      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <div class="auth-links">
      <a href="/login.html">Already have an account? Log in</a>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
