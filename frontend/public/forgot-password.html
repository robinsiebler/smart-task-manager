<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Smart Task Manager</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <h1>Forgot Password</h1>

    <p id="status-message" class="status-message" role="status" hidden></p>

    <form id="forgot-form" novalidate>
      <label for="forgot-email">Email</label>
      <input type="email" id="forgot-email" name="email" autocomplete="username" />
      <p class="field-error" id="forgot-email-error"></p>

      <button type="submit" class="btn btn-primary btn-block">Send Reset Token</button>
    </form>

    <form id="reset-form" class="reset-form" novalidate hidden>
      <label for="reset-token">Reset Token</label>
      <input type="text" id="reset-token" name="token" autocomplete="one-time-code" />
      <p class="field-error" id="reset-token-error"></p>

      <label for="reset-new-password">New Password</label>
      <div class="password-field">
        <input type="password" id="reset-new-password" name="newPassword" autocomplete="new-password" />
        <button type="button" class="password-toggle" id="reset-password-toggle" aria-label="Show password"></button>
      </div>
      <p class="field-error" id="reset-new-password-error"></p>

      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
    </form>

    <div class="auth-links">
      <a href="/login.html">Back to log in</a>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
